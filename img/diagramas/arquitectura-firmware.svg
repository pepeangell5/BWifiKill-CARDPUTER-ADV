<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#0d1117"/>
  <text x="600" y="55" fill="#f0f6fc" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" font-weight="700">Arquitectura visual del firmware</text>
  <text x="600" y="88" fill="#8b949e" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Menu por categorias, apps independientes y capa compartida de UI</text>

  <rect x="480" y="130" width="240" height="72" rx="16" fill="#161b22" stroke="#58a6ff" stroke-width="3"/>
  <text x="600" y="174" fill="#58a6ff" font-family="Arial, sans-serif" font-size="27" text-anchor="middle" font-weight="700">Main Menu</text>

  <g font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="55" y="285" width="160" height="70" rx="14" fill="#161b22" stroke="#3fb950" stroke-width="3"/>
    <text x="135" y="329" fill="#3fb950" text-anchor="middle">WiFi</text>
    <rect x="245" y="285" width="160" height="70" rx="14" fill="#161b22" stroke="#ffdf5d" stroke-width="3"/>
    <text x="325" y="329" fill="#ffdf5d" text-anchor="middle">RF Tools</text>
    <rect x="435" y="285" width="160" height="70" rx="14" fill="#161b22" stroke="#58a6ff" stroke-width="3"/>
    <text x="515" y="329" fill="#58a6ff" text-anchor="middle">Bluetooth</text>
    <rect x="625" y="285" width="160" height="70" rx="14" fill="#161b22" stroke="#ff7b72" stroke-width="3"/>
    <text x="705" y="329" fill="#ff7b72" text-anchor="middle">Ilegal</text>
    <rect x="815" y="285" width="160" height="70" rx="14" fill="#161b22" stroke="#d2a8ff" stroke-width="3"/>
    <text x="895" y="329" fill="#d2a8ff" text-anchor="middle">Games</text>
    <rect x="1005" y="285" width="160" height="70" rx="14" fill="#161b22" stroke="#ffa657" stroke-width="3"/>
    <text x="1085" y="329" fill="#ffa657" text-anchor="middle">Sistema</text>
  </g>

  <g stroke="#30363d" stroke-width="4">
    <line x1="600" y1="202" x2="135" y2="285"/>
    <line x1="600" y1="202" x2="325" y2="285"/>
    <line x1="600" y1="202" x2="515" y2="285"/>
    <line x1="600" y1="202" x2="705" y2="285"/>
    <line x1="600" y1="202" x2="895" y2="285"/>
    <line x1="600" y1="202" x2="1085" y2="285"/>
  </g>

  <rect x="120" y="445" width="430" height="92" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="335" y="481" fill="#f0f6fc" font-family="Arial, sans-serif" font-size="23" text-anchor="middle" font-weight="700">Capa visual compartida</text>
  <text x="335" y="512" fill="#8b949e" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Headers, iconos, animaciones y controles</text>

  <rect x="650" y="445" width="430" height="92" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="865" y="481" fill="#f0f6fc" font-family="Arial, sans-serif" font-size="23" text-anchor="middle" font-weight="700">Apps del firmware</text>
  <text x="865" y="512" fill="#8b949e" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Cada modulo conserva su logica interna</text>
</svg>
