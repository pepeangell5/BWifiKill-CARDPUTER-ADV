[platformio]
default_envs = cardputer_adv

[env]
platform = espressif32@6.4.0
framework = arduino

# Velocidad de comunicación y subida
monitor_speed = 115200
upload_speed = 921600 

# Configuración de compilación
upload_resetmethod = nodemcu
board_build.flash_mode = qio
board_build.partitions = huge_app.csv

# Flags de compilación mejorados
build_flags = 
    -I include
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384 ; Aumenta el stack para procesos pesados como el Sniffer

# Dependencias de Librerías
lib_deps =
    nrf24/RF24 @ ^1.4.7
    olikraus/U8g2 @ ^2.35.9
    marian-craciunescu/ESP32Ping @ ^1.7
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    t-vk/ESP32 BLE Keyboard @ ^0.3.2

build_src_filter =
    +<*>
    -<main_ble.cpp>

[env:esp32dev]
board = esp32dev

[env:cardputer_adv]
board = m5stack-stamps3
board_build.flash_size = 8MB
board_build.partitions = huge_app.csv
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BWK_CARDPUTER_ADV=1
    -D SCK=40
    -D MISO=39
    -D MOSI=14
    -D SS=12
build_src_flags =
    -include cardputer_compat.h
lib_deps =
    ${env.lib_deps}
    m5stack/M5Cardputer @ ^1.1.1
